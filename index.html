      { depth: 1, title: "Energy Infrastructure Destroyed", desc: "Israel strikes Iran's South Pars gas field (world's largest natural gas reserve). Iran retaliates on Qatar's Ras Laffan (processes 20% of global LNG). Strait of Hormuz closed since ~March 4. Total oil output cuts: 7–10 million barrels per day — 7–10% of global demand. Saudi, Bahraini, Kuwaiti, Iraqi refineries also attacked. This is the largest energy supply disruption in history.", status: "happened", date: "Feb 28 – Mar 18" },
      { depth: 2, title: "Energy Prices Spike Beyond Flow-Disruption Levels", desc: "Brent crude breaks $108/barrel. European gas benchmarks surge 63% in one week — another 6% on Mar 18 alone. U.S. gasoline heading toward $4+/gallon. Critical distinction: this is no longer just a transit disruption (Hormuz closure, reversible). Infrastructure is physically destroyed — LNG liquefaction trains take months to years to repair. Prices don't normalize at ceasefire. They normalize when infrastructure is rebuilt.", status: "happening", date: "Mar 2026" },
      { depth: 3, title: "Costs Cascade Through Every Supply Chain", desc: "Everything that moves by truck, ship, rail, or plane costs more. Diesel drives agriculture, logistics, and construction. Jet fuel drives air travel and air freight. Natural gas drives electricity in gas-dependent grids, industrial heating, and chemical manufacturing. Plastics, packaging, pharmaceuticals — all petroleum derivatives. The energy price isn't one price. It's the base layer under every other price in the economy.", status: "happening", date: "Mar–Apr 2026" },

      { depth: 7, title: "Developing World Food Crisis", desc: "Bangladesh, Pakistan, Egypt, the Philippines, and sub-Saharan Africa are most vulnerable: highly dependent on food imports, limited fiscal capacity to subsidize, populations already spending 40–60% of income on food. The UN counted 345 million people facing food insecurity after the 2022 spike. The 2026 shock is structurally deeper — affecting production capacity, not just trade routes. This number could grow to 400–500 million. Children, the elderly, and pregnant women are affected first.", status: "projected", date: "Q4 2026–2027" },

      { depth: 7, title: "5+ Nuclear States in Earth's Most Volatile Region", desc: "The Middle East — currently experiencing active wars, sectarian conflicts, border disputes, water scarcity, and refugee crises — would host more nuclear-armed states per square kilometer than any region on Earth. Nuclear deterrence theory was developed for two rational superpowers with dedicated communication channels and decades of arms control. It has never been tested with 5+ states entangled in complex, multi-directional rivalries where a conflict between any two could draw in the others.", status: "projected", date: "2030–2033" },

      { depth: 9, title: "Permanent Risk Premium on Global Energy", desc: "Nuclear risk doesn't just threaten the countries involved — it permanently reprices every investment, insurance contract, trade route, and business decision in the region. Gulf energy infrastructure investment carries a nuclear-risk discount forever. Insurance premiums never fully return to pre-proliferation levels. Capital flows away from the region that holds 48% of proven oil reserves and 38% of proven gas reserves. The cost of energy for everyone, everywhere, permanently increases.", status: "projected", date: "2030+" },
      { depth: 10, title: "Structural Energy Underinvestment — Permanent", desc: "If investment in Gulf energy production is permanently deterred by nuclear risk, the world faces chronic underinvestment in the region that remains essential to global energy supply — even as renewable transition accelerates. Renewables cannot replace Gulf hydrocarbons within 10–15 years; petrochemicals, aviation fuel, industrial heating, and fertilizer feedstock depend on fossil inputs for decades. This isn't a price spike. It's a structural reduction in the planet's energy investment capacity. And unlike every other chain in this tracker, nuclear proliferation is irreversible. You cannot un-invent a weapon.", status: "projected", date: "2035+" },
    ]
  }
];

const CROSSLINKS = [
  { from: "economy", fromLayer: 3, to: "food", toLayer: 2, desc: "Energy costs are the base input for fertilizer production — every dollar increase in gas prices directly raises the cost of growing food" },
  { from: "food", fromLayer: 6, to: "economy", toLayer: 6, desc: "Food price spikes compound the consumer spending collapse — households hit by higher gas AND higher grocery bills cut discretionary spending faster" },
  { from: "food", fromLayer: 8, to: "alliances", toLayer: 3, desc: "Food-driven instability in Egypt threatens Suez Canal operations — creating a SECOND major maritime chokepoint disruption alongside Hormuz" },
  { from: "alliances", fromLayer: 7, to: "economy", toLayer: 10, desc: "Dollar reserve decline raises U.S. borrowing costs — accelerating the fiscal doom loop" },
  { from: "technology", fromLayer: 7, to: "economy", toLayer: 6, desc: "Tech stock crash triggers reverse wealth effect — retirement accounts shrink, consumers spend less" },
  { from: "economy", fromLayer: 9, to: "alliances", toLayer: 9, desc: "Fiscal crisis forces defense budget cuts — weakening the military capacity that underpins all U.S. alliances" },
  { from: "nuclear", fromLayer: 9, to: "economy", toLayer: 2, desc: "Nuclear risk premium permanently raises energy costs for every economy on Earth" },
  { from: "nuclear", fromLayer: 7, to: "alliances", toLayer: 4, desc: "Proliferation reshapes all regional security partnerships — every alliance must account for nuclear scenarios" },
  { from: "food", fromLayer: 9, to: "alliances", toLayer: 3, desc: "Migration waves from food crises fuel anti-immigrant politics that weaken multilateral cooperation" },
  { from: "economy", fromLayer: 4, to: "technology", toLayer: 3, desc: "Fed paralysis + stagflation makes capital more expensive and ROI pressure more intense for AI investments" },
  { from: "alliances", fromLayer: 5, to: "economy", toLayer: 9, desc: "If oil leaves the dollar, U.S. fiscal arithmetic changes fundamentally — less foreign demand for Treasuries" },
  { from: "nuclear", fromLayer: 3, to: "nuclear", toLayer: 4, desc: "The lesson that conventional forces provide zero protection applies to EVERY country, not just Iran — accelerating proliferation globally" },
  { from: "technology", fromLayer: 9, to: "economy", toLayer: 10, desc: "Delayed AI productivity gains mean GDP grows slower than debt — worsening every fiscal ratio" },
  { from: "economy", fromLayer: 8, to: "food", toLayer: 3, desc: "Credit tightening from banking stress makes it harder for farmers to finance inputs — amplifying the fertilizer affordability problem" },
];

const STATUS_COLORS = {
  happened: "#DC2626",
  happening: "#EA580C",
  developing: "#D97706",
  emerging: "#CA8A04",
  projected: "#6B7280",
};
const STATUS_LABELS = {
  happened: "Has Happened",
  happening: "Happening Now",
  developing: "Developing",
  emerging: "Emerging",
  projected: "Projected",
};

const EVENTS = [
  { date: "Jan 3", event: "U.S. captures Maduro in Venezuela", color: "#7C3AED" },
  { date: "Feb 20", event: "Supreme Court strikes down IEEPA tariffs (6-3)", color: "#D97706" },
  { date: "Feb 28", event: "U.S.-Israel strike Iran; Khamenei killed", color: "#DC2626" },
  { date: "Mar 2", event: "Qatar halts LNG (20% of global supply) after strikes", color: "#DC2626" },
  { date: "Mar 4", event: "Iran effectively closes Strait of Hormuz", color: "#DC2626" },
  { date: "Mar 6", event: "Feb jobs report: -92,000 (expected +59,000)", color: "#D97706" },
  { date: "Mar 18", event: "Israel strikes South Pars; Iran hits Qatar's Ras Laffan", color: "#9F1239" },
  { date: "Mar 18", event: "Iran threatens 5 more Gulf facilities. Oil breaks $108.", color: "#9F1239" },
  { date: "Mar 18", event: "PPI: 0.7% (2× expected). Fed holds rates.", color: "#D97706" },
];

function App() {
  const [selectedChain, setSelectedChain] = useState(null);
  const [expandedLayers, setExpandedLayers] = useState({});
  const [view, setView] = useState("overview");

  const chain = CHAINS.find(c => c.id === selectedChain);

  const toggleLayer = useCallback((i) => {
    setExpandedLayers(prev => ({...prev, [i]: !prev[i]}));
  }, []);

  const openChain = useCallback((id) => {
    setSelectedChain(id);
    setExpandedLayers({});
    setView("overview");
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }, []);

  return (
    <div>
      {/* Header */}
      <header style={{
        borderBottom: "1px solid #1A1A1A",
        padding: "20px 24px",
        position: "sticky", top: 0, zIndex: 100,
        background: "#0A0A0BEE",
        backdropFilter: "blur(12px)",
      }}>
        <div style={{ maxWidth: 1100, margin: "0 auto", display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 12 }}>
          <div>
            <div style={{ fontSize: 10, letterSpacing: 3, color: "#DC2626", fontWeight: 700 }}>
              <span className="pulse" style={{ display: "inline-block", width: 6, height: 6, borderRadius: "50%", background: "#DC2626", marginRight: 8, verticalAlign: "middle" }}></span>
              LIVE TRACKING • UPDATED MARCH 18, 2026
            </div>
            <h1 style={{ margin: "4px 0 0", fontSize: 20, fontWeight: 700, color: "#FFF", letterSpacing: -0.3 }}>
              Global Polycrisis Cascade Tracker
            </h1>
            <div style={{ fontSize: 12, color: "#666", marginTop: 2 }}>
              Five crisis chains traced 10 layers deep • How they interact and amplify each other
            </div>
          </div>
          <div style={{ display: "flex", gap: 6 }}>
            {[["overview", "Chains"], ["connections", "Connections"], ["timeline", "Timeline"]].map(([v, label]) => (
              <button key={v} onClick={() => { setView(v); setSelectedChain(null); }}
                style={{
                  padding: "6px 14px", borderRadius: 6, border: "1px solid #333",
                  background: view === v ? "#222" : "transparent",
                  color: view === v ? "#FFF" : "#888",
                  cursor: "pointer", fontSize: 12, fontWeight: 600,
                }}>
                {label}
              </button>
            ))}
          </div>
        </div>
      </header>

      <main style={{ maxWidth: 1100, margin: "0 auto", padding: "20px 24px 60px" }}>
        {/* STATUS LEGEND */}
        <div style={{ display: "flex", gap: 16, marginBottom: 20, flexWrap: "wrap" }}>
          {Object.entries(STATUS_COLORS).map(([key, color]) => (
            <div key={key} style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 11 }}>
              <div style={{ width: 8, height: 8, borderRadius: "50%", background: color, boxShadow: key === "happened" || key === "happening" ? `0 0 6px ${color}88` : "none" }} />
              <span style={{ color: "#888" }}>{STATUS_LABELS[key]}</span>
            </div>
          ))}
        </div>

        {/* OVERVIEW */}
        {view === "overview" && !selectedChain && (
          <div className="fade-in">
            <p style={{ color: "#999", fontSize: 14, lineHeight: 1.7, maxWidth: 700, marginBottom: 24 }}>
              Each card below is a <strong style={{ color: "#CCC" }}>cascade chain</strong> — a sequence of dominoes where each one knocks over the next.
              The deeper you go, the harder the effects are to reverse. Click any chain to trace all 10 layers.
            </p>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(320px, 1fr))", gap: 16 }}>
              {CHAINS.map(c => {
                const active = c.layers.filter(l => l.status !== "projected").length;
                return (
                  <div key={c.id} onClick={() => openChain(c.id)}
                    style={{
                      background: "#111", border: `1px solid ${c.color}22`, borderRadius: 12,
                      padding: 20, cursor: "pointer", transition: "all 0.2s", position: "relative", overflow: "hidden",
                    }}
                    onMouseEnter={e => { e.currentTarget.style.borderColor = c.color + "88"; e.currentTarget.style.transform = "translateY(-2px)"; }}
                    onMouseLeave={e => { e.currentTarget.style.borderColor = c.color + "22"; e.currentTarget.style.transform = "none"; }}
                  >
                    <div style={{ position: "absolute", top: 0, left: 0, right: 0, height: 3, background: `linear-gradient(90deg, ${c.color}, transparent)` }} />
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                      <span style={{ fontSize: 28 }}>{c.icon}</span>
                      <span style={{ fontSize: 10, fontWeight: 700, letterSpacing: 1, color: c.color, background: c.color + "15", padding: "3px 8px", borderRadius: 4 }}>{c.status}</span>
                    </div>
                    <h3 style={{ margin: "12px 0 4px", fontSize: 17, fontWeight: 700, color: "#FFF" }}>{c.title}</h3>
                    <div style={{ fontSize: 12, color: c.color, marginBottom: 8, fontWeight: 500 }}>{c.subtitle}</div>
                    <p style={{ fontSize: 13, color: "#999", lineHeight: 1.5, margin: "0 0 16px" }}>{c.summary}</p>
                    <div style={{ display: "flex", gap: 3 }}>
                      {c.layers.map((l, i) => (
                        <div key={i} style={{ flex: 1, height: 4, borderRadius: 2, background: STATUS_COLORS[l.status], opacity: l.status === "projected" ? 0.3 : 1 }} />
                      ))}
                    </div>
                    <div style={{ fontSize: 11, color: "#555", marginTop: 8 }}>{active}/10 layers active or developing • Click →</div>
                  </div>
                );
              })}
            </div>
            {/* Key Insight */}
            <div style={{ marginTop: 32, padding: 24, background: "#111", borderRadius: 12, border: "1px solid #DC262622" }}>
              <h3 style={{ color: "#DC2626", fontSize: 15, margin: "0 0 8px" }}>Why "Polycrisis" — Not Just "Multiple Crises"</h3>
              <p style={{ color: "#CCC", fontSize: 14, lineHeight: 1.7, margin: 0 }}>
                If these were five separate crises, you could solve them one at a time. But they interact: energy costs drive food costs. Food crises drive migration. Migration drives politics. Politics drives alliance decisions. Alliance decisions determine military posture. Military posture determines whether the next crisis can be deterred. <strong style={{ color: "#FFF" }}>Each crisis consumes the resources and institutional capacity that would buffer against the others.</strong> That's the polycrisis — not a list of problems but a system of reinforcing failures where solving one often worsens another.
              </p>
            </div>
          </div>
        )}

        {/* CHAIN DETAIL */}
        {view === "overview" && selectedChain && chain && (
          <div className="fade-in">
            <button onClick={() => { setSelectedChain(null); setExpandedLayers({}); }}
              style={{ background: "none", border: "1px solid #333", color: "#888", padding: "6px 14px", borderRadius: 6, cursor: "pointer", fontSize: 12, marginBottom: 20 }}>
              ← All chains
            </button>
            <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 8 }}>
              <span style={{ fontSize: 36 }}>{chain.icon}</span>
              <div>
                <h2 style={{ margin: 0, fontSize: 24, color: "#FFF" }}>{chain.title}</h2>
                <div style={{ fontSize: 14, color: chain.color, fontWeight: 500 }}>{chain.subtitle}</div>
              </div>
            </div>
            <p style={{ color: "#999", fontSize: 14, lineHeight: 1.7, maxWidth: 700, marginBottom: 4 }}>{chain.summary}</p>
            <p style={{ color: "#666", fontSize: 13, marginBottom: 24 }}>Each layer triggers the next. Click any layer to expand the full explanation.</p>
            <div style={{ position: "relative" }}>
              <div style={{ position: "absolute", left: 19, top: 0, bottom: 0, width: 2, background: `linear-gradient(to bottom, ${chain.color}, ${chain.color}11)` }} />
              {chain.layers.map((layer, i) => {
                const isActive = layer.status === "happened" || layer.status === "happening";
                const isExpanded = expandedLayers[i];
                const crosslinks = CROSSLINKS.filter(cl =>
                  (cl.from === chain.id && cl.fromLayer === layer.depth) ||
                  (cl.to === chain.id && cl.toLayer === layer.depth)
                );
                return (
                  <div key={i} onClick={() => toggleLayer(i)} style={{ display: "flex", gap: 16, marginBottom: 10, cursor: "pointer", position: "relative" }}>
                    <div style={{ width: 40, minWidth: 40, display: "flex", flexDirection: "column", alignItems: "center", paddingTop: 4 }}>
                      <div style={{
                        width: isActive ? 18 : 14, height: isActive ? 18 : 14, borderRadius: "50%",
                        background: STATUS_COLORS[layer.status], border: `2px solid ${isActive ? STATUS_COLORS[layer.status] : "#333"}`,
                        boxShadow: isActive ? `0 0 12px ${STATUS_COLORS[layer.status]}66` : "none", zIndex: 1,
                      }} />
                      <div style={{ fontSize: 10, color: "#555", marginTop: 4, fontWeight: 700 }}>L{layer.depth}</div>
                    </div>
                    <div style={{
                      flex: 1, background: isExpanded ? "#151515" : "#0F0F0F",
                      border: `1px solid ${isExpanded ? chain.color + "44" : "#1A1A1A"}`, borderRadius: 10, padding: "14px 18px",
                      transition: "all 0.15s",
                    }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 8 }}>
                        <h4 style={{ margin: 0, fontSize: 15, color: "#FFF", fontWeight: 600 }}>{layer.title}</h4>
                        <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                          <span style={{ fontSize: 10, fontWeight: 600, color: STATUS_COLORS[layer.status], background: STATUS_COLORS[layer.status] + "15", padding: "2px 8px", borderRadius: 4 }}>
                            {STATUS_LABELS[layer.status]}
                          </span>
                          <span style={{ fontSize: 11, color: "#555" }}>{layer.date}</span>
                        </div>
                      </div>
                      {isExpanded && (
                        <div style={{ marginTop: 12 }} className="fade-in">
                          <p style={{ fontSize: 13, color: "#BBB", lineHeight: 1.75, margin: 0 }}>{layer.desc}</p>
                          {crosslinks.length > 0 && (
                            <div style={{ marginTop: 14, padding: "12px 14px", background: "#0A0A0B", borderRadius: 8, border: "1px solid #1A1A1A" }}>
                              <div style={{ fontSize: 10, color: "#555", fontWeight: 700, letterSpacing: 1, marginBottom: 8, textTransform: "uppercase" }}>
                                Connected to other chains:
                              </div>
                              {crosslinks.map((cl, j) => {
                                const isOutgoing = cl.from === chain.id && cl.fromLayer === layer.depth;
                                const otherId = isOutgoing ? cl.to : cl.from;
                                const other = CHAINS.find(c => c.id === otherId);
                                return (
                                  <div key={j} style={{ fontSize: 12, color: other.color, marginBottom: 6, cursor: "pointer", padding: "4px 0" }}
                                    onClick={(e) => { e.stopPropagation(); openChain(other.id); }}>
                                    <span style={{ marginRight: 6 }}>{isOutgoing ? "→" : "←"}</span>
                                    <span style={{ marginRight: 6 }}>{other.icon}</span>
                                    <strong>{other.title}:</strong>{" "}
                                    <span style={{ color: "#999" }}>{cl.desc}</span>
                                  </div>
                                );
                              })}
                            </div>
                          )}
                          {i < chain.layers.length - 1 && (
                            <div style={{ marginTop: 12, fontSize: 12, color: chain.color, fontWeight: 500 }}>
                              ↓ This triggers Layer {layer.depth + 1}: {chain.layers[i+1].title}
                            </div>
                          )}
                        </div>
                      )}
                      {!isExpanded && <div style={{ fontSize: 12, color: "#444", marginTop: 6 }}>Click to expand →</div>}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* CONNECTIONS VIEW */}
        {view === "connections" && (
          <div className="fade-in">
            <h2 style={{ fontSize: 20, color: "#FFF", marginBottom: 4 }}>How the Chains Connect</h2>
            <p style={{ color: "#999", fontSize: 14, lineHeight: 1.7, maxWidth: 700, marginBottom: 24 }}>
              No crisis exists alone. These are the feedback loops — the channels through which solving or ignoring one problem changes all the others.
            </p>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(340px, 1fr))", gap: 12 }}>
              {CROSSLINKS.map((cl, i) => {
                const from = CHAINS.find(c => c.id === cl.from);
                const to = CHAINS.find(c => c.id === cl.to);
                return (
                  <div key={i} style={{ background: "#111", borderRadius: 10, padding: 16, border: "1px solid #1A1A1A" }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 8, flexWrap: "wrap" }}>
                      <span style={{ fontSize: 18 }}>{from.icon}</span>
                      <span style={{ color: from.color, fontSize: 12, fontWeight: 600 }}>{from.title} L{cl.fromLayer}</span>
                      <span style={{ color: "#444" }}>→</span>
                      <span style={{ fontSize: 18 }}>{to.icon}</span>
                      <span style={{ color: to.color, fontSize: 12, fontWeight: 600 }}>{to.title} L{cl.toLayer}</span>
                    </div>
                    <div style={{ fontSize: 13, color: "#BBB", lineHeight: 1.6 }}>{cl.desc}</div>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* TIMELINE VIEW */}
        {view === "timeline" && (
          <div className="fade-in">
            <h2 style={{ fontSize: 20, color: "#FFF", marginBottom: 4 }}>Event Timeline</h2>
            <p style={{ color: "#999", fontSize: 14, lineHeight: 1.7, maxWidth: 700, marginBottom: 24 }}>
              The events that triggered the cascades — nine watershed moments in 77 days.
            </p>
            <div style={{ position: "relative", paddingLeft: 30 }}>
              <div style={{ position: "absolute", left: 10, top: 0, bottom: 0, width: 2, background: "linear-gradient(to bottom, #DC2626, #DC262622)" }} />
              {EVENTS.map((e, i) => (
                <div key={i} style={{ marginBottom: 16, position: "relative" }} className="fade-in">
                  <div style={{
                    position: "absolute", left: -25, top: 6, width: 12, height: 12, borderRadius: "50%",
                    background: e.color, border: "2px solid #0A0A0B", zIndex: 1,
                  }} />
                  <div style={{ background: "#111", borderRadius: 10, padding: "14px 18px", border: `1px solid ${e.color}22` }}>
                    <span style={{ color: e.color, fontWeight: 700, fontSize: 14, marginRight: 12 }}>{e.date}</span>
                    <span style={{ color: "#CCC", fontSize: 14 }}>{e.event}</span>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* FOOTER */}
        <footer style={{ marginTop: 48, padding: "24px 0", borderTop: "1px solid #1A1A1A", textAlign: "center", color: "#444", fontSize: 11, lineHeight: 1.8 }}>
          <strong style={{ color: "#888" }}>Global Polycrisis Cascade Tracker</strong><br />
          Research &amp; Analysis: Triparna de Vreede, Ph.D. • University of South Florida, Muma College of Business<br />
          Data as of March 18, 2026, 11:59 PM EST • Updated on significant status change<br />
          <span style={{ color: "#555" }}>Based on the Global Systemic Risk Report series (October 2025 – present)</span>
        </footer>
      </main>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
