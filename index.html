<script>
window.CHAINS=[{"id": "economy", "title": "The Inflation Spiral", "sub": "Energy → Economy → Your Wallet", "icon": "💰", "color": "#DC2626", "cat": "economic", "status": "ACTIVE", "sum": "How $100+ oil becomes job losses, a trapped Fed, and a debt spiral that consumes America's fiscal future", "layers": [{"d": 1, "t": "Energy Infrastructure Destroyed", "desc": "Israel strikes South Pars (world's largest gas field). Iran hits Qatar's Ras Laffan (20% of global LNG). Hormuz closed. 7-10M bbl/day cut. Saudi, Bahraini, Kuwaiti, Iraqi refineries attacked. Largest energy disruption in history.", "s": "happened", "dt": "Feb 28–Mar 18"}, {"d": 2, "t": "Prices Spike Beyond Flow-Disruption", "desc": "Brent crude hit $118 (Mar 19), stabilizing around $108-112. Goldman Sachs warns oil may stay above $100 through 2027 — not weeks, not months, through next year. European gas +63% in one week. Infrastructure physically destroyed — QatarEnergy CEO confirms Ras Laffan damage cuts 17% of LNG output for up to FIVE YEARS. This is not a flow disruption. This is a structural rewrite of global energy markets.", "s": "happening", "dt": "Mar 2026"}, {"d": 3, "t": "Costs Cascade Through Every Supply Chain", "desc": "Everything that moves costs more. Diesel drives agriculture, logistics, construction. Jet fuel drives air travel. Gas drives electricity, heating, chemical manufacturing. Energy is the base layer under every other price.", "s": "happening", "dt": "Mar–Apr 2026"}, {"d": 4, "t": "The Fed Is Trapped", "desc": "Feb PPI: 0.7% (2× expected) — before full oil shock. Core PCE stuck at ~3%. Fed held steady Mar 18. Bond traders have CANCELLED bets on rate cuts. Some now see a slight possibility of a rate HIKE in 2026 — unthinkable three weeks ago. The Fed isn't just trapped — the trap is tightening. IEA urging people to work from home and avoid air travel as emergency demand reduction.", "s": "happened", "dt": "Mar 2026"}, {"d": 5, "t": "Housing Stays Frozen", "desc": "No rate cuts → mortgages above 6.5% → market locked. Sector in recession. Immigration crackdown raised construction labor costs 6.1%. Lumber tariffs. Energy costs. New supply shrinks further.", "s": "developing", "dt": "Q2 2026"}, {"d": 6, "t": "Consumer Spending Collapses", "desc": "Gas at $3.91/gallon nationally (up from $2.93 on Feb 20). Households spending $20-40/week more on gas alone. Georgia became first state to suspend fuel taxes (60-day halt). Florida's DeSantis refused. Goldman: $100+ oil through 2027. Add rising food prices (Q3-Q4) and this becomes a sustained multi-year squeeze, not a temporary spike.", "s": "happening", "dt": "Q2–Q3 2026"}, {"d": 7, "t": "Businesses Cut, Small Firms Fail", "desc": "Feb jobs: -92,000 (expected +59,000). Negative in 5 of 9 months. BLS revised 2025 down by 911,000 — largest ever. Small business expectations at lowest since 2020.", "s": "emerging", "dt": "Q2–Q3 2026"}, {"d": 8, "t": "Regional Banking Stress", "desc": "CRE maturity wall + consumer credit stress + small business defaults + higher costs. Regional bank failures become probable. Credit tightening accelerates recession.", "s": "projected", "dt": "Q3–Q4 2026"}, {"d": 9, "t": "The Deficit Explodes", "desc": "Tax revenue down + military spending up (Pentagon requesting $200B supplemental — 'it takes money to kill bad guys' per Defense Sec Hegseth) + IEEPA refunds ($175B) + lower tariff revenue + tax cuts + safety net costs + interest ($300B per 1% rate increase on $30T+ debt). The $200B war supplemental alone exceeds the combined budgets of Transportation and Justice departments.", "s": "developing", "dt": "2026–2027"}, {"d": 10, "t": "The Doom Loop", "desc": "Higher deficits → more borrowing → higher rates → higher interest → higher deficits. Social Security depletion (2033-34) arrives with no fiscal space. Shock absorbers consumed.", "s": "projected", "dt": "2027–2030"}]}, {"id": "food", "title": "The Invisible Famine", "sub": "Gas → Fertilizer → Your Grocery Bill", "icon": "🌾", "color": "#D97706", "cat": "economic", "status": "BUILDING", "sum": "Today's gas prices are locking in next season's food crisis during spring planting — irreversible once seeds are in the ground", "layers": [{"d": 1, "t": "Natural Gas Surges 50–63%", "desc": "Gas is the primary feedstock for nitrogen fertilizer. European benchmarks +50%. Asian +39%. Another 6% Mar 18 after South Pars/Ras Laffan. Qatar (18.5 bcf/day) offline.", "s": "happened", "dt": "Mar 2–18"}, {"d": 2, "t": "Fertilizer Costs Spike 40–70%", "desc": "Gas → ammonia → urea. Basic chemistry, no substitutes. Every $1/MMBtu increase = $15-20/tonne ammonia cost. Qatar fertilizer production offline. European plants face shutdown.", "s": "happening", "dt": "Mar–May 2026"}, {"d": 3, "t": "Farmers Face Impossible Math", "desc": "Spring planting is NOW. Pay 40-70% more for fertilizer, apply less (lower yields), plant fewer acres, or switch crops. All lead to less food, more expensive.", "s": "happening", "dt": "Mar–May 2026"}, {"d": 4, "t": "Yield Reduction Physically Locked In", "desc": "CRITICAL: Once planted with less nitrogen, lower yield is DETERMINED by soil chemistry. Cannot retroactively fix. Food shock being coded into the ground right now.", "s": "developing", "dt": "Mar–May 2026"}, {"d": 5, "t": "Harvests Fall Short", "desc": "Reduced nitrogen lowers yields 15-30%. Even 10% global shortfall = ~280M tonnes — roughly equal to entire U.S. annual grain production.", "s": "projected", "dt": "Aug–Oct 2026"}, {"d": 6, "t": "Global Food Prices Spike", "desc": "2022: ~30% increase from Russia-Ukraine. 2026 affects ALL nitrogen fertilizer globally + transport costs. Americans: +15-25%. Developing world: +30-50%.", "s": "projected", "dt": "Q3–Q4 2026"}, {"d": 7, "t": "Developing World Food Crisis", "desc": "Bangladesh, Pakistan, Egypt, Philippines: 40-60% of income on food. 345M food-insecure after 2022. Could reach 400-500M.", "s": "projected", "dt": "Q4 2026–2027"}, {"d": 8, "t": "Instability at Critical Chokepoints", "desc": "Food prices triggered Arab Spring. Egypt operates Suez Canal — 12% of global trade. Instability = BOTH chokepoints (Hormuz AND Suez) disrupted. Unprecedented.", "s": "projected", "dt": "2027"}, {"d": 9, "t": "Migration and Political Backlash", "desc": "Food insecurity drives migration into countries already stressed. Anti-immigrant politics strengthen. Cooperative institutions weakened by reactions to the crises they'd need to solve.", "s": "projected", "dt": "2027–2028"}, {"d": 10, "t": "The Fragility Trap", "desc": "Less cooperation → less capacity → more disruption → less cooperation. Food feeds economy (inflation), alliances (politics), nuclear (unstable states). Each cycle makes recovery harder.", "s": "projected", "dt": "2028+"}]}, {"id": "alliances", "title": "The Petrodollar Fracture", "sub": "Gulf War → Alliance Shift → Dollar Decline", "icon": "🌐", "color": "#7C3AED", "cat": "geopolitical", "status": "ACCELERATING", "sum": "Destroying Qatar's infrastructure while hosting U.S. bases inverts the logic of America's most important economic alliance", "layers": [{"d": 1, "t": "Gulf Infrastructure Destroyed as Collateral", "desc": "Ras Laffan, Ras Tanura (struck twice), Sitra, Mina al-Ahmadi, Majnoon: all attacked. These nations didn't start this war. Their infrastructure pays because they host U.S. bases.", "s": "happened", "dt": "Mar 2–18"}, {"d": 2, "t": "Protector Becomes the Threat", "desc": "40+ year deal inverted. Iran's logic proven: your bases = your infrastructure targeted. Qatar condemned South Pars strike. Saudi Arabia: 'trust is gone.' Trump called NATO allies 'COWARDS' for not helping secure Hormuz. Sri Lanka denied permission for U.S. bombers to base there, seeking neutrality. Countries actively distancing from U.S. military footprint.", "s": "happened", "dt": "Mar 2026"}, {"d": 3, "t": "Gulf States Reassess", "desc": "Saudi deepening China ties. UAE bought Chinese military systems. Alternative security architecture exists in embryonic form. Question: do bases make us targets?", "s": "happening", "dt": "2026"}, {"d": 4, "t": "China Fills the Vacuum", "desc": "Opposing Iran war, advocating Hormuz freedom, offering mediation. Largest Gulf oil customer. No regime-change baggage. Brokered Saudi-Iran normalization in 2023.", "s": "developing", "dt": "2026–2027"}, {"d": 5, "t": "Oil Leaves the Dollar", "desc": "Saudi already conducted yuan trades. If 10-20% priced in other currencies, petrodollar system (since 1974) begins structural erosion. Slow compound, not sudden death.", "s": "projected", "dt": "2026–2028"}, {"d": 6, "t": "Reserve Diversification Accelerates", "desc": "Dollar share fell 72% → 58% over two decades. Digital yuan bypasses SWIFT. Gulf wants alternatives after seeing sanctions weaponized.", "s": "projected", "dt": "2027–2030"}, {"d": 7, "t": "U.S. Borrowing Costs Rise", "desc": "Less dollar demand → less Treasury demand → higher yields → higher interest. Each 1% = ~$300B annually on $30T+ debt. A ratchet, not a crisis.", "s": "projected", "dt": "2028–2032"}, {"d": 8, "t": "Fiscal Crisis Deepens", "desc": "Higher borrowing + exploding deficits + Social Security depletion + military demands + tariff refunds. Arithmetic becomes impossible.", "s": "projected", "dt": "2030–2035"}, {"d": 9, "t": "Military Capability Erodes", "desc": "Defense budgets vs. interest and entitlements. Navy at 280-ship minimum. Modernization delays. Defense industrial base atrophies.", "s": "projected", "dt": "2030–2040"}, {"d": 10, "t": "Deterrence Fails", "desc": "Weaker military + frayed alliances + fiscal constraints + overextension. Great-power transitions happen through compounding costs meeting rising challengers.", "s": "projected", "dt": "2035+"}]}, {"id": "tech", "title": "The AI Reckoning", "sub": "Energy Costs → Data Centers → Market Crash", "icon": "🤖", "color": "#0891B2", "cat": "economic", "status": "BUILDING", "sum": "How the energy crisis intersects with the largest technology investment bubble in history", "layers": [{"d": 1, "t": "Energy Costs Spike 30–50%", "desc": "Data centers consume city-scale electricity. AI training runs cost $100M+. Already straining grids. Now +30-50% energy costs.", "s": "happened", "dt": "Mar 2026"}, {"d": 2, "t": "Hyperscaler Economics Compress", "desc": "$650-750B planned 2026 capex assumed moderate energy. Amazon, Meta, Google approaching negative free cash flow. Energy increases hit margins directly.", "s": "happening", "dt": "Q1–Q2 2026"}, {"d": 3, "t": "ROI Question Unavoidable", "desc": "MIT: 95% zero ROI. BofA: 1/3 think overinvestment. AI spending at 0.8% of GDP. Depreciation on $2T assets = ~$400B/yr, exceeding combined profits.", "s": "developing", "dt": "Q2 2026"}, {"d": 4, "t": "Capex Decelerates Early", "desc": "Goldman: 60%+ → 17% by 2027. Energy pressure pulls forward 2-3 quarters. Markets price deceleration 6-12 months early.", "s": "projected", "dt": "Q2–Q3 2026"}, {"d": 5, "t": "Semiconductor Demand Softens", "desc": "TSMC stock peaks 1-2 quarters before earnings, declines 30-59%. Memory prices +40% Q1. Cycle naturally peaks Q3 2026–Q3 2027.", "s": "projected", "dt": "Q3–Q4 2026"}, {"d": 6, "t": "Tech Correction: 25–35%", "desc": "Magnificent 7 at extreme multiples. Compression from 25× to historical 18-20× = 20-30% downside.", "s": "projected", "dt": "Q3 2026–Q1 2027"}, {"d": 7, "t": "Wealth Effect Reversal", "desc": "Stock drops → people spend less. Tech correction + energy inflation + food prices = triple hit to confidence. 401(k)s, pensions, endowments all down.", "s": "projected", "dt": "Q4 2026–2027"}, {"d": 8, "t": "AI Revolution Delays 3–5 Years", "desc": "Enterprise adoption extends. Workforce transformation slows. Benefits don't arrive on schedule.", "s": "projected", "dt": "2027–2030"}, {"d": 9, "t": "Valuation Basis Shifts", "desc": "$8T in projected productivity gains delayed = valuations wrong by 15-25%, debt trajectories worse than CBO estimates.", "s": "projected", "dt": "2028–2032"}, {"d": 10, "t": "The Lost Decade", "desc": "S&P 500: 3.1% annually for next decade. Growth stocks: 1.4% (below inflation). A generation's retirement planning doesn't work.", "s": "projected", "dt": "2026–2036"}]}, {"id": "nuclear", "title": "The Proliferation Cascade", "sub": "Today's Strikes → Nuclear Middle East", "icon": "☢️", "color": "#9F1239", "cat": "geopolitical", "status": "ACCELERATING", "sum": "Iran's conventional destruction makes nuclear weapons nearly inevitable — and proliferation is irreversible", "layers": [{"d": 1, "t": "Iran's Military Destroyed", "desc": "Navy, air force, air defense, radar: destroyed. Supreme Leader killed. IRGC spokesman killed Mar 20. Intelligence chief killed. Most comprehensive dismantling since Iraq 2003. Netanyahu claims Iran can no longer enrich uranium or produce ballistic missiles. Yet Iran still launching dozens of salvos daily — 12+ on Mar 20 alone. An F-35 was hit by Iranian fire (first U.S. aircraft struck). The 'destroyed' military keeps fighting.", "s": "happened", "dt": "Feb 28–Mar 18"}, {"d": 2, "t": "Strikes Near Nuclear Sites", "desc": "South Pars near Bushehr (Russian-built/staffed). Russia condemned strikes. Israel struck Iranian naval targets in the CASPIAN SEA — bordered by Russia, Kazakhstan, Turkmenistan, Azerbaijan. Massive geographic escalation bringing strikes to Russia's doorstep. Netanyahu says 'there has to be a ground component' for regime change.", "s": "happened", "dt": "Mar 2026"}, {"d": 3, "t": "Lesson: Conventional = Zero Protection", "desc": "Every defense planner worldwide: Iran had Middle East's largest military. Didn't matter. Universal lesson.", "s": "happening", "dt": "Mar 2026"}, {"d": 4, "t": "Nuclear Becomes Iranian Consensus", "desc": "Before: debate between reformists and hardliners. After: debate over. No leader can argue against deterrent. North Korea lesson applied.", "s": "developing", "dt": "2026–2027"}, {"d": 5, "t": "Saudi Arabia Activates", "desc": "MBS: will pursue if Iran does. Saudi-Pakistan pathway. Unlimited capital. Dual-use civilian infrastructure.", "s": "projected", "dt": "2027–2029"}, {"d": 6, "t": "Turkey, Egypt, UAE Follow", "desc": "All have civilian programs. Cannot accept strategic inferiority. 3-5 additional programs within 3-5 years.", "s": "projected", "dt": "2028–2031"}, {"d": 7, "t": "5+ Nuclear States", "desc": "Active wars, sectarian conflicts, water scarcity — with more nuclear states per km² than anywhere. Deterrence never tested with 5+ multi-directional rivalries.", "s": "projected", "dt": "2030–2033"}, {"d": 8, "t": "Deterrence Instability", "desc": "More actors = more failure points. Accidental, unauthorized, miscalculation, desperation. Compound probability accumulates annually.", "s": "projected", "dt": "2030+"}, {"d": 9, "t": "Permanent Energy Risk Premium", "desc": "Nuclear risk reprices everything in the region. 48% of oil, 38% of gas reserves carry permanent nuclear discount.", "s": "projected", "dt": "2030+"}, {"d": 10, "t": "Irreversible", "desc": "Every other chain has a reversal point. Infrastructure rebuilds. Markets recover. Nuclear proliferation is permanent. Cannot un-invent weapons.", "s": "projected", "dt": "2035+"}]}, {"id": "water", "title": "The Thirst Cascade", "sub": "Energy Strikes → Desalination → Survival", "icon": "💧", "color": "#0EA5E9", "cat": "infrastructure", "status": "ACTIVE", "sum": "Gulf nations get 70-99% of drinking water from desalination powered by the energy infrastructure being bombed", "layers": [{"d": 1, "t": "Desalination Under Direct Threat", "desc": "400+ plants produce 40% of world's desalinated water. Qatar: 99% dependent. Kuwait: 90%. Saudi burns 300K bbl/day for desalination. Iran struck Qeshm Island plant. Bahrain plant hit Mar 9. Bahrain has now intercepted 139 missiles and 238 drones since war began — a tiny island nation under sustained assault.", "s": "happened", "dt": "Mar 2–18"}, {"d": 2, "t": "Energy Down = Water Down", "desc": "Co-generation facilities: power and water integrated. Grid damage = water production stops. Force majeure spreading across Gulf energy facilities.", "s": "happening", "dt": "Mar 2026"}, {"d": 3, "t": "Reserves in Days, Not Months", "desc": "UAE: 16-45 days. Abu Dhabi aquifer: 90 days. Kuwait/Bahrain: least resilience. Leaked cable: Riyadh 'would evacuate in a week' if Jubail plant destroyed.", "s": "happening", "dt": "Mar 2026"}, {"d": 4, "t": "Iran's Restraint May Not Hold", "desc": "So far targeting energy not water directly. But IRGC has named facilities near desalination. Escalation logic: each retaliation justifies the next. One strike on water = humanitarian catastrophe.", "s": "developing", "dt": "2026"}, {"d": 5, "t": "Food Imports Collapse Simultaneously", "desc": "Gulf food prices +10-18% YoY. Import 80-90% of food. Hormuz closure + insurance withdrawal = food supply chains breaking. QatarEnergy CEO confirms Ras Laffan damage = 17% LNG cut for up to 5 YEARS, with force majeure on contracts to Belgium, Italy, South Korea, and China. A fifth of Lebanon's population displaced in two weeks.", "s": "happened", "dt": "Mar 2026"}, {"d": 6, "t": "Mass Displacement Risk", "desc": "If water infrastructure sustains damage: Dubai 3.6M, Riyadh 7.6M, Kuwait City 2.4M face evacuation scenarios. Where do millions go?", "s": "projected", "dt": "2026–2027"}, {"d": 7, "t": "Rebuilding Blocked", "desc": "QatarEnergy CEO: 5-year repair timeline for Ras Laffan. $20B annual losses. 9% hit to Qatar's GDP. This isn't 'rebuilding blocked' as a future risk — it's the confirmed reality. Kuwait's Mina Al-Ahmadi refinery struck AGAIN overnight Mar 20, fires still burning. Insurance costs make new construction virtually impossible in active war zone.", "s": "happened", "dt": "2027–2028"}, {"d": 8, "t": "Habitability Questions", "desc": "If infrastructure carries permanent war premium, long-term viability of Gulf cities as population centers comes into question. World's fastest-growing urban areas.", "s": "projected", "dt": "2028–2030"}, {"d": 9, "t": "Water-Energy Feedback Loop", "desc": "Desalination also produces industrial water for refineries and petrochemical plants. Water shortage = energy production shortage = more water shortage.", "s": "projected", "dt": "2027+"}, {"d": 10, "t": "Climate + Water = Existential", "desc": "Gulf already reaches human survivability limits in summer. Without reliable desalination AND AC (both energy-dependent), parts become uninhabitable. Not decades — years in extreme scenarios.", "s": "projected", "dt": "2030+"}]}, {"id": "insurance", "title": "The Uninsurability Spiral", "sub": "War Risk → No Coverage → No Trade", "icon": "📋", "color": "#A855F7", "cat": "economic", "status": "ACTIVE", "sum": "When insurers pull out, ships can't sail, goods can't move, and infrastructure can't be rebuilt", "layers": [{"d": 1, "t": "Marine Insurance Cancelled", "desc": "All 12 P&I Clubs cancelled Gulf coverage within 72 hours. War risk premiums: 0.05% → 1-3% (300-1,000% increase). VLCC: $200K → $1-7.5M per voyage. Lloyd's expanded risk zone.", "s": "happened", "dt": "Mar 2–5"}, {"d": 2, "t": "Shipping Paralysis", "desc": "Hormuz: 138/day → single digits. $1,500-3,000/TEU surcharges. Without insurance, ships can't sail — ports won't accept uninsured vessels.", "s": "happening", "dt": "Mar 2026"}, {"d": 3, "t": "$20B U.S. Backstop Insufficient", "desc": "DFC facility excludes liability/pollution (P&I). JPMorgan: total needs $352B. Facility may not restart full shipping.", "s": "happening", "dt": "Mar 2026"}, {"d": 4, "t": "Trade Finance Breaks", "desc": "Letters of credit require insured cargo. No insurance = banks won't finance trade. Not just oil — every manufactured good, food import, industrial input.", "s": "developing", "dt": "Mar–Apr 2026"}, {"d": 5, "t": "Rebuilding Blocked", "desc": "QatarEnergy CEO: 5-year repair timeline. $20B/year losses. Kuwait refinery hit repeatedly — fires reigniting. Haifa refinery struck. Infrastructure can't be rebuilt in active war zone without insurance. Underwriters won't cover it. The physical repair clock hasn't even started because the damage is still ongoing.", "s": "happened", "dt": "2026"}, {"d": 6, "t": "Domestic Crisis Compounds", "desc": "California FAIR Plan +43% after LA wildfires. Florida retreat deepening. 6th consecutive year of $100B+ insured catastrophe losses. Multiple fronts straining same capital.", "s": "happening", "dt": "2026"}, {"d": 7, "t": "Reinsurance Repricing", "desc": "$660-735B reinsurance capital priced in January assuming no war. Swiss Re warned: Hormuz disruption could expose $14.5T over 5 years. That scenario is now reality.", "s": "developing", "dt": "2026–2027"}, {"d": 8, "t": "Permanent Gulf Risk Premium", "desc": "Even after ceasefire, insurance carries war-risk memory. Structural — doesn't reset. Every project costs more permanently.", "s": "projected", "dt": "2027+"}, {"d": 9, "t": "Investment Deterred", "desc": "Higher insurance + construction + operating costs = lower returns. Vision 2030, North Field expansion, NEOM all face repriced risk.", "s": "projected", "dt": "2027–2030"}, {"d": 10, "t": "The Uninsurability Convergence", "desc": "War risk (Gulf) + climate risk (coastal U.S.) + cyber risk (everywhere) + pandemic risk (unhedged) = growing swaths of global economy effectively uninsurable.", "s": "projected", "dt": "2030+"}]}, {"id": "cyber", "title": "The Digital Battlefield", "sub": "Iran War → Cyber Attacks → Physical Damage", "icon": "🔒", "color": "#EF4444", "cat": "infrastructure", "status": "ACTIVE", "sum": "The largest wartime cyberattack in U.S. history hit while cyber defenses were being cut", "layers": [{"d": 1, "t": "Largest Wartime Cyberattack", "desc": "Stryker medical attack (Mar 11) disabled manufacturing/shipping for 150M patients across 61 countries. Hospitals paused vital-sign data. 'Most significant wartime cyberattack against the U.S. in history.' Iran claims it has targeted U.S. Embassy logistics base in Baghdad three times on Mar 20. Cyber and kinetic attacks converging.", "s": "happened", "dt": "Mar 11"}, {"d": 2, "t": "60+ Groups Mobilize", "desc": "Claims of attacks on water, grain storage. CISA: 136 CVEs targeted. 3,100+ critical infrastructure entities confirmed exposed.", "s": "happening", "dt": "Mar 2026"}, {"d": 3, "t": "Banking Under Assault", "desc": "Akamai: 245% increase in credential harvesting/DDoS prep. Banking/fintech = 40% of malicious traffic. Iran publicly named U.S. banks as targets.", "s": "happening", "dt": "Mar 2026"}, {"d": 4, "t": "Salt Typhoon Still Active", "desc": "FBI: 'still very much ongoing.' 200+ companies, 80 countries. 1M+ user metadata. Near-complete wiretap list obtained. FCC rolled BACK telecom cyber rules.", "s": "happening", "dt": "Mar 2026"}, {"d": 5, "t": "Defenders Gutted", "desc": "CISA budget cut ~$300M. 3,732 → ~2,649 staff. Trump cyber strategy: 3 pages (vs 34). No mandatory requirements. Voluntary only.", "s": "happened", "dt": "2025–2026"}, {"d": 6, "t": "Critical Infrastructure Pre-Positioned", "desc": "Volt Typhoon in electric utilities, water, comms. Not theoretical — implants already present, waiting for activation.", "s": "happening", "dt": "Ongoing"}, {"d": 7, "t": "Grid Vulnerability", "desc": "Coordinated Northeast attack: 93M without power. Water, hospitals, comms, finance all fail within hours. Recovery: weeks to months.", "s": "projected", "dt": "2026–2027"}, {"d": 8, "t": "Financial System Disruption", "desc": "Cyber incidents up 300% since 2020. Lloyd's: $240B-$1T losses from coordinated financial attack. Harvard: cyber 'more likely culprit' for next financial crisis.", "s": "projected", "dt": "2026–2028"}, {"d": 9, "t": "Attribution Fog", "desc": "Iran, China, Russia, criminals all operating simultaneously. Response paralyzed by uncertainty about who to retaliate against.", "s": "projected", "dt": "2026+"}, {"d": 10, "t": "Permanent Cyber Fog of War", "desc": "Every adversary learned: wartime = perfect cover for cyber ops against civilians. The 'peacetime' internet is over.", "s": "projected", "dt": "2027+"}]}, {"id": "health", "title": "The Pandemic Blindspot", "sub": "CDC Gutted → H5N1 Unmonitored → ?", "icon": "🏥", "color": "#F43F5E", "cat": "domestic", "status": "BUILDING", "sum": "Bird flu in 989 dairy herds while the institutions that would detect a pandemic have been dismantled", "layers": [{"d": 1, "t": "Public Health Gutted", "desc": "CDC: ~4,300 workers lost (1/3). 1,050+ scientists. No director 6+ months. NIH: 5,844 grants cancelled. HHS: 82K → 62K. WHO exit completed Jan 22, 2026.", "s": "happened", "dt": "2025–2026"}, {"d": 2, "t": "Vaccine Development Cancelled", "desc": "$766M Moderna mRNA contracts cancelled — including H5N1. Now dependent on egg-based production: months vs weeks during outbreak.", "s": "happened", "dt": "May 2025"}, {"d": 3, "t": "H5N1 Spreading Uncontrolled", "desc": "989 dairy herds, 17 states. 71 human cases, 2 deaths. Scientists: 'completely out of control.' Containment window once pandemic strain emerges: 2-10 detected cases.", "s": "happening", "dt": "Mar 2026"}, {"d": 4, "t": "Surveillance Degraded", "desc": "CDC: weekly → monthly H5N1 reporting. 800+ cancelled grants in infectious disease. Wastewater surveillance uncertain. Detection system dismantled during pre-pandemic.", "s": "happening", "dt": "2026"}, {"d": 5, "t": "Healthcare Workforce Crisis", "desc": "Shortage: 141,160 physicians by 2038, 263,870 RNs in 2026. 80,162 nursing applicants turned away. Immigration restrictions affect 25% of physicians.", "s": "happening", "dt": "2026"}, {"d": 6, "t": "If H5N1 Goes Pandemic", "desc": "Without mRNA: 6+ months for vaccine. Without surveillance: weeks undetected. Without WHO: limited coordination. Without workers: hospitals overwhelmed.", "s": "projected", "dt": "2026–2027"}, {"d": 7, "t": "Pandemic + Stagflation + War", "desc": "Catastrophically worse than COVID during relative peace. No fiscal space for stimulus. No political unity. No institutional trust.", "s": "projected", "dt": "2026–2028"}, {"d": 8, "t": "Medical Supply Chains Disrupted", "desc": "PPE, medications manufactured overseas. Hormuz closure + insurance crisis affect pharmaceutical supply chains. With IEA telling people to avoid air travel and shipping paralyzed, medical supply chains face the same chokepoint disruptions as everything else. Antibiotics depend on Chinese/Indian raw materials routed through affected waters.", "s": "developing", "dt": "2026–2027"}, {"d": 9, "t": "State-Level Fragmentation", "desc": "Federal CDC funding = 55% of local health budgets. Cuts cascade. Blue states may maintain capacity; red states may not. Virus doesn't respect state lines.", "s": "projected", "dt": "2026+"}, {"d": 10, "t": "Institutional Memory Lost", "desc": "Rebuilding takes 5-10 years even with will. Scientists won't return. Knowledge gone. U.S. faces next pandemic with weakest infrastructure since before 1918 flu.", "s": "projected", "dt": "2027–2035"}]}, {"id": "labor", "title": "The Labor Vortex", "sub": "Immigration → Worker Shortage → Everything Costs More", "icon": "👷", "color": "#F97316", "cat": "domestic", "status": "ACTIVE", "sum": "Net immigration negative for first time since 1935 — the economy can't function without the workers who left", "layers": [{"d": 1, "t": "Net Immigration Goes Negative", "desc": "First time since 1935. Foreign-born population: -1.5M in 6 months. 1.2M foreign-born workers left labor force. Border apprehensions -95%.", "s": "happened", "dt": "2025–2026"}, {"d": 2, "t": "Construction Crisis", "desc": "Needs 349,000 workers in 2026. 92% of firms can't find qualified workers. 45% have project delays. Labor costs +6-8% annually.", "s": "happening", "dt": "2026"}, {"d": 3, "t": "Farm Workforce Collapses", "desc": "Lost 155,000 ag workers Mar-Jul 2025. Only 182 domestic workers applied for 415,000+ H-2A positions. Admin reversed course, expanding H-2A.", "s": "happening", "dt": "2025–2026"}, {"d": 4, "t": "Healthcare Shortage Deepens", "desc": "8.06% national nursing shortage. 84% of nursing homes understaffed. $100K H-1B fee hits rural healthcare recruitment.", "s": "happening", "dt": "2026"}, {"d": 5, "t": "Housing More Unaffordable", "desc": "Can't build without workers + affordable lumber (tariffs) + lower rates (Fed trapped). Supply deficit widens. Prices stay elevated.", "s": "developing", "dt": "2026"}, {"d": 6, "t": "Food Prices: Double Hit", "desc": "10% farm employment decrease = ~3% food price increase (MSU research). COMPOUNDS fertilizer-driven increase. Gas at $3.91 and climbing — Georgia suspending fuel tax, Florida refusing. The cost of getting food from farm to store is spiking from BOTH the labor side and the energy side simultaneously.", "s": "happening", "dt": "Q3–Q4 2026"}, {"d": 7, "t": "AI Data Centers Can't Be Built", "desc": "$700B combined capex competing for same construction workers as housing, hospitals, infrastructure. Physical AI buildout bottlenecked.", "s": "developing", "dt": "2026–2027"}, {"d": 8, "t": "Structural, Not Cyclical", "desc": "Can't train a nurse, plumber, or farmer in months. Workforce gap persists even if policy reverses — trust broken, pipelines empty.", "s": "projected", "dt": "2027–2028"}, {"d": 9, "t": "Care Crisis", "desc": "Fewer healthcare workers + aging population (seniors > children by 2034) + underfunded SSA. Who cares for aging America?", "s": "projected", "dt": "2028–2035"}, {"d": 10, "t": "Demographic Doom Loop", "desc": "Fewer immigrants → fewer workers → lower GDP → less revenue → worse fiscal position → less capacity to attract immigrants. Competitors gain.", "s": "projected", "dt": "2030+"}]}, {"id": "epistemic", "title": "The Blindfold", "sub": "Data Disappears → Can't Measure → Can't Respond", "icon": "👁️", "color": "#14B8A6", "cat": "domestic", "status": "ACTIVE", "sum": "3,000+ federal datasets removed, BLS commissioner fired, October CPI never collected — America is losing the ability to see reality", "layers": [{"d": 1, "t": "Federal Data Disappearing", "desc": "3,000+ datasets removed. USDA defunded food security survey. NOAA stopped Billion Dollar Disasters database. EPA removed ALL climate info (500+ changes).", "s": "happened", "dt": "2025–2026"}, {"d": 2, "t": "BLS Attacked", "desc": "Commissioner fired Aug 2025 — S&P dropped 2.5%. Lost ~25% staff. 1/3 leadership vacant. Oct 2025 CPI never collected (shutdown) — permanent gap. Budget cuts jobs/inflation data ~8%.", "s": "happened", "dt": "2025–2026"}, {"d": 3, "t": "Job Numbers Were Fiction", "desc": "Revision: 2025 payrolls were 181,000 — not 584,000 reported. Only ~15,000/month. Economy vastly weaker than known because data was wrong.", "s": "happened", "dt": "Jan 2026"}, {"d": 4, "t": "Endangerment Finding Revoked", "desc": "Feb 12: legal foundation for ALL federal GHG regulation eliminated. Combined with data removal: can neither measure nor regulate emissions.", "s": "happened", "dt": "Feb 2026"}, {"d": 5, "t": "NOAA Gutted", "desc": "~2,200 staff lost (~20%). Weather balloons ceased at Alaska stations. Models discontinued. Satellite decommissioning. Hurricane forecasting degrading during escalating extremes.", "s": "happening", "dt": "2025–2026"}, {"d": 6, "t": "Fed Can't Calibrate", "desc": "Unreliable BLS data = Fed decisions based on faulty inputs. Missing Oct CPI = trend gap. Policy on bad data produces bad outcomes.", "s": "happening", "dt": "2026"}, {"d": 7, "t": "Investors Flying Blind", "desc": "Jobs swinging from +59K expected to -92K actual. Prior years revised down 900K. Price discovery breaks. Volatility increases.", "s": "developing", "dt": "2026"}, {"d": 8, "t": "Health Surveillance Fails", "desc": "CDC pages removed. H5N1 reporting reduced. Disease surveillance infrastructure dismantled. Outbreaks detected later or not at all.", "s": "happening", "dt": "2026"}, {"d": 9, "t": "AI Disinfo Fills the Void", "desc": "BBC: more AI misinfo than traditional in Iran conflict. Fake videos: 100M+ views. Meta eliminated fact-checking. V-Dem: U.S. press freedom lowest since WWII.", "s": "happening", "dt": "2026"}, {"d": 10, "t": "Democracy Requires Shared Facts", "desc": "Self-governance depends on citizens evaluating reality. If economic, climate, and health data are unreliable and info space flooded with fakes — what basis for accountability?", "s": "developing", "dt": "2026+"}]}, {"id": "climate", "title": "The Accelerating Baseline", "sub": "Records → Infrastructure Failure → No Response Capacity", "icon": "🌡️", "color": "#10B981", "cat": "environmental", "status": "ACTIVE", "sum": "2025 third hottest year, 54% of U.S. in drought, Colorado River at 25% — while monitoring systems are dismantled", "layers": [{"d": 1, "t": "Temperature Records Continue", "desc": "2025: third warmest at 1.44°C. Three-year average exceeded 1.5°C first time. Ocean heat: new record, +23 zettajoules (39× all human energy use).", "s": "happened", "dt": "2025"}, {"d": 2, "t": "U.S. Drought Emergency", "desc": "53.97% of Lower 48 in drought (+10.7% in one month). 144M people, 46 states. Colorado: Powell 25% full, inflows 36% of normal. Mead 34%.", "s": "happening", "dt": "Mar 2026"}, {"d": 3, "t": "Corpus Christi Water Emergency", "desc": "Lake below 10% capacity. America's top crude oil export port faces water emergency by November 2026.", "s": "happening", "dt": "2026"}, {"d": 4, "t": "El Niño Forming", "desc": "62% probability by Jun-Aug 2026. Some models: Super El Niño by winter. Would amplify 2027 temps while monitoring is dismantled.", "s": "developing", "dt": "2026"}, {"d": 5, "t": "Insurance Retreat Domestic", "desc": "6th consecutive year $100B+ insured losses. California, Florida becoming uninsurable in exposed areas.", "s": "happening", "dt": "2025–2026"}, {"d": 6, "t": "Monitors Going Dark", "desc": "NOAA lost ~20% workforce. Balloons ceased. Satellites decommissioning. Sea ice monitoring reduced. The eyes watching are closing.", "s": "happening", "dt": "2026"}, {"d": 7, "t": "2026 Hurricane Season", "desc": "Warmer oceans + El Niño + degraded NOAA + reduced FEMA + insurance retreat = highest vulnerability in memory. Gulf Coast and Florida exposed.", "s": "projected", "dt": "Jun–Nov 2026"}, {"d": 8, "t": "Agricultural Double Hit", "desc": "Drought reduces domestic yields while fertilizer shortage reduces global yields. Southwest losing Colorado River water. Farm labor shortage compounds both.", "s": "happening", "dt": "2026"}, {"d": 9, "t": "Adaptation Spending Impossible", "desc": "Pentagon requesting $200B war supplemental. Every dollar on Iran is a dollar not on resilience. IEA telling people to stay home — implicitly acknowledging the energy crisis makes normal economic activity unsustainable. Adaptation spending was already losing to debt service and tax cuts. Now it's losing to war too.", "s": "happening", "dt": "2026–2028"}, {"d": 10, "t": "The Compounding Trap", "desc": "Damage → fiscal pressure → adaptation cut → more damage. Regulatory and monitoring capacity dismantled. Flying blind into accelerating risk.", "s": "projected", "dt": "2028+"}]}, {"id": "trade", "title": "The Dual Chokepoint", "sub": "Hormuz + Red Sea = Trade Paralysis", "icon": "🚢", "color": "#6366F1", "cat": "infrastructure", "status": "ACTIVE", "sum": "For the first time ever, both major maritime chokepoints between Asia and Europe are simultaneously closed", "layers": [{"d": 1, "t": "Hormuz Closed", "desc": "138/day → single digits (95%+ decline). Only 21 tankers since war began. Iran selectively allowing passage — weaponizing access.", "s": "happened", "dt": "Mar 4+"}, {"d": 2, "t": "Red Sea/Suez Also Disrupted", "desc": "Iran war shattered return to Suez routing. All major carriers suspended trans-Suez. Cape diversions reinstated. Both chokepoints offline — unprecedented.", "s": "happening", "dt": "Mar 2026"}, {"d": 3, "t": "Oil Beyond Precedent", "desc": "Brent: $65 pre-war → peak $118 → hovering $108-112. Goldman: above $100 through 2027. Dubai crude: all-time high >$150. IEA projected 8M bbl/day supply plunge. 32 countries released 400M barrels. IEA now urging people to work from home, avoid air travel, reduce highway speeds as emergency fuel-demand measures. The energy agency for last resort is telling civilization to slow down.", "s": "happened", "dt": "Mar 2026"}, {"d": 4, "t": "Semiconductor Supply Threatened", "desc": "Taiwan: 11 days LNG reserves. TSMC depends on LNG through conflict zone. Memory +40% Q1. Helium shortages may force chip prioritization.", "s": "happening", "dt": "Mar 2026"}, {"d": 5, "t": "Container Shipping Repriced", "desc": "$1,500-3,000/TEU surcharges. Cape routing: +10-14 days, +$1M+ fuel. Consumer goods, electronics, auto parts, pharma: delayed and expensive.", "s": "happening", "dt": "Mar 2026"}, {"d": 6, "t": "Panama Bright Spot, Limited", "desc": "Full capacity, historic-high water levels. But fraction of displaced volume. Not a substitute for Hormuz+Suez combined.", "s": "happening", "dt": "Mar 2026"}, {"d": 7, "t": "Just-in-Time Breaks", "desc": "IEA urging work-from-home and flight avoidance as emergency measures. Container surcharges of $1,500-3,000/TEU. Cape routing: +10-14 days, +$1M+ fuel per voyage. US-Indonesia deal signed (32% → 19% tariffs) as admin builds bilateral replacements for IEEPA. But just-in-time manufacturing breaking across auto, electronics, pharma.", "s": "happening", "dt": "Q2 2026"}, {"d": 8, "t": "Smartphone Market Contracts", "desc": "Memory shortage: projected 12.9% contraction — sharpest ever. AI gets priority; consumer electronics don't.", "s": "projected", "dt": "Q2–Q3 2026"}, {"d": 9, "t": "Trade Policy Chaos", "desc": "IEEPA struck down. Section 122 expires Jul 24. Section 301 takes 12-18 months. Supply disruption AND tariff uncertainty simultaneously.", "s": "happening", "dt": "2026"}, {"d": 10, "t": "Reshoring Rhetoric vs Reality", "desc": "Needs workers (shortage), factories (construction shortage), energy (spiking), capital (tightening), time (years). Dependence continues while vulnerability exposed.", "s": "projected", "dt": "2026–2030"}]}, {"id": "governance", "title": "The Hollowed State", "sub": "DOGE Cuts → No Capacity → Every Crisis Worse", "icon": "🏛️", "color": "#64748B", "cat": "domestic", "status": "ACTIVE", "sum": "Largest peacetime federal workforce cut happened just before largest geopolitical crisis since 9/11", "layers": [{"d": 1, "t": "Largest Peacetime Cut", "desc": "~242,000 employees (~10%). USAID: -97%. GSA: -40%. EPA: -25%. IRS: 102K → 74K. SSA: -7,000+. DOGE claimed $199-206B savings; actual: ~$1-7B.", "s": "happened", "dt": "2025–2026"}, {"d": 2, "t": "Tax Collection Collapsing", "desc": "IRS projects $500B+ revenue losses from enforcement cuts. 2M+ returns backlogged. Fewer auditors = more evasion = bigger deficits.", "s": "happening", "dt": "2026"}, {"d": 3, "t": "Social Security Under Siege", "desc": "SSA: -7,000 employees. 65% report service decline. DOGE sought data access — courts blocked. Trust fund depletion approaching with degraded capacity.", "s": "happening", "dt": "2026"}, {"d": 4, "t": "FEMA Weakened Before Peak", "desc": "Budget uncertainty + cuts = diminished disaster response heading into hurricane/wildfire season. The backstop is failing.", "s": "happening", "dt": "2026"}, {"d": 5, "t": "Regulatory Capacity Destroyed", "desc": "EPA lost nearly half staff. Can't enforce laws, monitor pollution, respond to spills. Endangerment Finding revoked — no legal authority either.", "s": "happened", "dt": "2025–2026"}, {"d": 6, "t": "Data Infrastructure Collapses", "desc": "BLS, Census, NOAA, CDC, USDA all degraded. Foundation for policy, investment, accountability has gaps that may never be filled.", "s": "happening", "dt": "2026"}, {"d": 7, "t": "Courts Push Back, Can't Restore", "desc": "Judges blocked some actions. But can't rehire workers, restore knowledge, rebuild systems. Legal victories are pyrrhic.", "s": "happening", "dt": "2026"}, {"d": 8, "t": "Crisis Management Gone", "desc": "Iran war (Day 21) + Venezuela operation + pandemic risk + hurricane season + cyber attacks + economic downturn + DHS PARTIAL SHUTDOWN with TSA officers going unpaid during active war. Pentagon requesting $200B supplemental. 2,200 more Marines + 3 warships deploying even as Trump talks about 'winding down.' 13 U.S. service members killed. Government managing multiple wars with fewer people and a partially shut-down homeland security department.", "s": "happened", "dt": "Mar 2026"}, {"d": 9, "t": "Knowledge Irreplaceable", "desc": "Senior scientists, diplomats, analysts — gone. Takes decades to build. Even with will: 5-10 years minimum to restore.", "s": "developing", "dt": "2026+"}, {"d": 10, "t": "The Capacity Trap", "desc": "Degraded gov → worse outcomes → public loses faith → cover for more cuts → further degradation. Incompetence created by cutting is used to justify more cutting.", "s": "developing", "dt": "2026+"}]}, {"id": "cohesion", "title": "The Fracturing", "sub": "Crises Converge → Trust Dies → Democracy Strains", "icon": "🪞", "color": "#EC4899", "cat": "domestic", "status": "ACCELERATING", "sum": "Sentiment at 2nd percentile, 59% oppose Iran war, trust at 17%, political violence at 1970s levels — heading into midterms", "layers": [{"d": 1, "t": "Consumer Sentiment Collapses", "desc": "Michigan: 55.5 — 2nd percentile of entire history. Below starting value of all six recessions since tracking began. Affordability is #1 flashpoint.", "s": "happened", "dt": "Mar 2026"}, {"d": 2, "t": "No Rally Effect", "desc": "CNN: 59% disapprove Iran strikes. Quinnipiac: 53% oppose, 74% oppose ground troops. No rally effect. Trump calling NATO 'cowards' while requesting $200B supplemental. Newsom: '$200B for war but not for Obamacare subsidies.' Gas prices up $1/gallon in 3 weeks. 1,444 Iranian civilians dead including 204 children. 13 U.S. service members killed. Al-Aqsa mosque closed during Eid for first time since 1967.", "s": "happened", "dt": "Mar 2026"}, {"d": 3, "t": "Trust at Historic Lows", "desc": "17% trust government (Pew). Democrats: 9% — never lower. Trump: 40.9% approval, underwater full year. Credibility exhausted.", "s": "happening", "dt": "2026"}, {"d": 4, "t": "Political Violence Escalating", "desc": "~150 attacks in H1 2025 — nearly 2× H1 2024. FBI: 1,700+ domestic terrorism investigations. V-Dem: 'speed of dismantlement unprecedented.'", "s": "happening", "dt": "2025–2026"}, {"d": 5, "t": "AI Disinfo Floods Midterms", "desc": "First major cycle with industrial-scale AI misinfo. Meta eliminated fact-checking. Voters can't distinguish real from fake.", "s": "developing", "dt": "2026"}, {"d": 6, "t": "Midterms: Referendum on Everything", "desc": "Democrats: D+5 generic ballot, ~69% House probability. GOP defends 22/35 Senate seats. Vote is about affordability, war, trust simultaneously.", "s": "developing", "dt": "Nov 2026"}, {"d": 7, "t": "Lame Duck Chaos", "desc": "If Dems win House: divided government during peak crises. Gridlock on fiscal policy, war authorization, debt ceiling, entitlements.", "s": "projected", "dt": "Jan 2027"}, {"d": 8, "t": "Legitimacy Crisis", "desc": "Contested results + political violence + AI misinfo undermining confidence = mechanism for course correction becomes a crisis site.", "s": "projected", "dt": "Nov 2026–2027"}, {"d": 9, "t": "Policy Paralysis Locks In", "desc": "Divided gov + distrust + violence + contested legitimacy = inability to address ANY other cascade. Everything requiring governance capacity stalls.", "s": "projected", "dt": "2027–2028"}, {"d": 10, "t": "The Polycrisis Endpoint", "desc": "Every chain terminates here: erosion of collective response capacity. Not collapse — grinding degradation. The system loses the ability to fix itself, one capability at a time.", "s": "projected", "dt": "2028+"}]}];
